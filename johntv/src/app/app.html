<div class="shell">
  @if (routeLoading()) {
    <div class="route-loader" aria-hidden="true"></div>
  }

  <header class="topbar">
    <div class="logotext">
      <img class="logo" src="images/icon.svg"/>
      <p class="brand-mark">JohnTV</p>
    </div>

    <nav class="center-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/matches" routerLinkActive="active">Matches</a>
      <a routerLink="/posts" routerLinkActive="active">Predictions</a>
      <a routerLink="/account" routerLinkActive="active">Account</a>
    </nav>
    
    <nav class="nav">
          @if (!authService.currentUser()) {
        <a routerLink="/auth" routerLinkActive="active">Login</a>
      }
      @if (authService.currentUser()) {
        <button type="button" class="logout" (click)="logout()">Logout</button>
      }
      </nav>
  </header>

  @if (authService.currentUser(); as user) {
    <section class="welcome">
      Signed in as <strong>{{ user.username }}</strong>
    </section>
  }

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
